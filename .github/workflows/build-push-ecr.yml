name: Build and Push to ECR

on:
  push:
    branches: ["main"]

# id-token: write is required for OIDC role assumption.
# Replaces the previous AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY approach.
permissions:
  contents: read
  id-token: write

jobs:
  build_push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          source-account-id: ${{ vars.160768284037 }}
          aws-region: us-east-1

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, push
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
          REPO_NAME: tradingq-app
        run: |
          set -euo pipefail
          IMAGE_URI="${ECR_REGISTRY}/${REPO_NAME}"
          TAG="${GITHUB_SHA}"
          docker build -t "${REPO_NAME}:${TAG}" .
          docker tag "${REPO_NAME}:${TAG}" "${IMAGE_URI}:${TAG}"
          docker tag "${REPO_NAME}:${TAG}" "${IMAGE_URI}:latest"
          docker push "${IMAGE_URI}:${TAG}"
          docker push "${IMAGE_URI}:latest"
          echo "IMAGE=${IMAGE_URI}:${TAG}" >> $GITHUB_ENV

      - name: Output image
        run: echo "Pushed $IMAGE"
# Configure AWS credentials for GitHub Actions\n\nname: Build and Push to ECR\n\non: [push, pull_request]\n\njobs:\n  build:\n    runs-on: ubuntu-latest\n    steps:\n      - name: Checkout code\n        uses: actions/checkout@v2\n\n      - name: Configure AWS Credentials\n        uses: aws-actions/configure-aws-credentials@v1\n        with:\n          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}\n          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}\n          aws-region: us-east-1\n\n      - name: Build Docker image\n        run: docker build . -t my-image\n\n      - name: Authenticate to Amazon ECR\n        run: aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin <account-id>.dkr.ecr.us-east-1.amazonaws.com\n\n      - name: Push to Amazon ECR\n        run: docker push <account-id>.dkr.ecr.us-east-1.amazonaws.com/my-image\n
